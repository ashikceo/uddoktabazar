version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: uddoktar-bazar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: uddoktar
      POSTGRES_PASSWORD: uddoktar_secret_2024
      POSTGRES_DB: uddoktar_bazar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uddoktar -d uddoktar_bazar"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uddoktar-bazar-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://uddoktar:uddoktar_secret_2024@db:5432/uddoktar_bazar?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: your-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
